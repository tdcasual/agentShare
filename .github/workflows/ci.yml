name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Bootstrap shared dev runtime
        run: PYTHON_BIN=python ./scripts/ops/bootstrap-dev-runtime.sh

      - name: Run API migrations
        working-directory: apps/api
        run: alembic upgrade head

      - name: Run API tests
        run: PYTHONPATH=apps/api pytest apps/api/tests tests/ops -q

      - name: Validate Docker Compose
        run: docker compose config

      - name: Run web typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Run web lint
        working-directory: apps/web
        run: npm run lint

      - name: Run web contract drift checks
        working-directory: apps/web
        run: npm run test:contracts

      - name: Run web unit tests
        working-directory: apps/web
        run: npm run test:unit

      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Run Playwright tests
        working-directory: apps/web
        run: npx playwright test
