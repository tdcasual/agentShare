name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/control-plane-v3/package-lock.json

      - name: Bootstrap shared dev runtime
        run: PYTHON_BIN=python ./scripts/ops/bootstrap-dev-runtime.sh

      - name: Run API migrations
        working-directory: apps/api
        run: ../../.venv/bin/python -m alembic upgrade head

      - name: Run unified control plane verification
        run: ./scripts/ops/verify-control-plane.sh
