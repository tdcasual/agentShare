services:
  openbao:
    image: docker.io/openbao/openbao:latest
    command: ["/bin/sh", "/openbao/config/start-openbao.sh"]
    cap_add:
      - IPC_LOCK
    volumes:
      - ./ops/openbao/openbao.hcl:/openbao/config/openbao.hcl:ro
      - ./ops/openbao/start-openbao.sh:/openbao/config/start-openbao.sh:ro
      - openbao-data:/openbao/data
      - openbao-bootstrap:/openbao/bootstrap
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health?standbyok=true"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_share}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agent_share}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      openbao:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${API_PORT:-8000}:8000"
    volumes:
      - openbao-bootstrap:/openbao/bootstrap:ro
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_share}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_BACKEND: ${SECRET_BACKEND:-openbao}
      OPENBAO_ADDR: ${OPENBAO_ADDR:-http://openbao:8200}
      OPENBAO_TOKEN_FILE: ${OPENBAO_TOKEN_FILE:-/openbao/bootstrap/root-token}
      OPENBAO_MOUNT: ${OPENBAO_MOUNT:-secret}
      OPENBAO_PREFIX: ${OPENBAO_PREFIX:-agent-share}
      BOOTSTRAP_OWNER_KEY: ${BOOTSTRAP_OWNER_KEY:?BOOTSTRAP_OWNER_KEY is required}
      MANAGEMENT_SESSION_SECRET: ${MANAGEMENT_SESSION_SECRET:?MANAGEMENT_SESSION_SECRET is required}
      MANAGEMENT_SESSION_COOKIE_NAME: ${MANAGEMENT_SESSION_COOKIE_NAME:-management_session}
      MANAGEMENT_SESSION_SECURE: ${MANAGEMENT_SESSION_SECURE:-true}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      RUN_DB_MIGRATIONS_ON_STARTUP: ${RUN_DB_MIGRATIONS_ON_STARTUP:-true}
      # Optional LLM runtime passthrough
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/control-plane-v3/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_BIND_HOST:-127.0.0.1}:${WEB_PORT:-3000}:3000"
    environment:
      AGENT_CONTROL_PLANE_API_URL: ${AGENT_CONTROL_PLANE_API_URL:-http://api:8000}
      MANAGEMENT_SESSION_COOKIE_NAME: ${MANAGEMENT_SESSION_COOKIE_NAME:-management_session}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://${PUBLIC_HOST:-localhost}}
      AGENT_CONTROL_PLANE_DEMO_MODE: ${AGENT_CONTROL_PLANE_DEMO_MODE:-false}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  openbao-data:
  openbao-bootstrap:
  postgres-data:
  redis-data:
